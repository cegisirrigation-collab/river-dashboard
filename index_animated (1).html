<script>
/* ── roundRect polyfill for older Chromium on outdoor displays ── */
if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        r = Math.min(r, w/2, h/2);
        this.beginPath();
        this.moveTo(x+r, y);
        this.lineTo(x+w-r, y); this.arcTo(x+w, y, x+w, y+r, r);
        this.lineTo(x+w, y+h-r); this.arcTo(x+w, y+h, x+w-r, y+h, r);
        this.lineTo(x+r, y+h); this.arcTo(x, y+h, x, y+h-r, r);
        this.lineTo(x, y+r); this.arcTo(x, y, x+r, y, r);
        this.closePath();
    };
}

/* ================= SYSTEM DATA STORAGE ARCHITECTURE ================= */
const thresholds = {

    "Peradeniya":                { alert: 5.0, minor: 7.0,  major: 9.0,  maxScale: 12.0, unit: "m" },
    "Nawalapitiya":              { alert: 3.5, minor: 5.0,  major: 6.0,  maxScale: 8.5,  unit: "m" },
    "Weraganthota":              { alert: 5.0, minor: 6.0,  major: 8.0,  maxScale: 11.0, unit: "m" },
    "Thaldena":                  { alert: 3.0, minor: 4.0,  major: 5.0,  maxScale: 7.5,  unit: "m" },

    "Katharagama":               { alert: 4.0, minor: 4.6,  major: 6.5,  maxScale: 8.5,  unit: "m" },

    "Siyambalanduwa":            { alert: 4.5, minor: 6.0,  major: 7.0,  maxScale: 9.5,  unit: "m" },

    "Galgamuwa":                 { alert: 4.84, minor: 5.94, major: 8.0, maxScale: 11.0, unit: "m" },
    "Giriulla":                  { alert: 5.5, minor: 6.5,  major: 7.5,  maxScale: 10.0, unit: "m" }
};

const API_URL = "https://services3.arcgis.com/J7ZFXmR8rSmQ3FGf/arcgis/rest/services/survey123_72977f4e45c2412f8bc7bcd5d9db0c7a_stakeholder/FeatureServer/0/query?where=1%3D1&outFields=basin,gauge,water_level,rain_fall,EditDate&orderByFields=EditDate DESC&f=pjson";

let stationsData = [];     
let historicalRaw = [];    
let currentSlide = 0;
let liveChartInstance = null; 

function checkDayNightProfile() {
    const currentHour = new Date().getHours();
    const isDay = currentHour >= 6 && currentHour < 18;
    document.body.classList.toggle("day-mode", isDay);
}

/* ================= LIVE STREAM DATA FETCH ENGINE ================= */
async function loadData(){
    checkDayNightProfile();
    try {
        const response = await fetch(API_URL + "&_t=" + Date.now());
        const data = await response.json();

        if(!data.features || data.features.length === 0) return;

        historicalRaw = data.features; 

        const latestStations = {};
        data.features.forEach(f => {
            const a = f.attributes;
            if(!a.basin || !a.gauge) return;

            let gaugeName = a.gauge.trim();
            if (gaugeName.toLowerCase() === "pera" || gaugeName.toLowerCase() === "peradeniya") {
                gaugeName = "Peradeniya";
                a.gauge = "Peradeniya";
            }

            if(!latestStations[gaugeName] || a.EditDate > latestStations[gaugeName].EditDate){
                latestStations[gaugeName] = a;
            }
        });

        let rawList = Object.values(latestStations);

        rawList.sort((a, b) => {
            const basinA = a.basin.replace(/basin/gi, "").trim().toLowerCase();
            const basinB = b.basin.replace(/basin/gi, "").trim().toLowerCase();
            if (basinA !== basinB) return basinA.localeCompare(basinB); 
            return a.gauge.trim().localeCompare(b.gauge.trim());
        });

        stationsData = rawList;

        if(stationsData.length > 0){
            const latest = new Date(data.features[0].attributes.EditDate);
            document.getElementById("updateTime").innerText = latest.toLocaleTimeString("en-GB");
        }
        renderSlide();
    } catch(err) {
        console.error("Data Stream Synch Fault:", err);
    }
}

/* ================= VECTOR SPEEDOMETER MATH TRANSFORMATIONS ================= */
function describeArc(x, y, radius, startAngle, endAngle){
    const start = polarToCartesian(x, y, radius, endAngle);
    const end = polarToCartesian(x, y, radius, startAngle);
    const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
    return ["M", start.x, start.y, "A", radius, radius, 0, largeArcFlag, 0, end.x, end.y].join(" ");
}

function polarToCartesian(centerX, centerY, radius, angleInDegrees) {
    const angleInRadians = (angleInDegrees-90) * Math.PI / 180.0;
    return {
        x: centerX + (radius * Math.cos(angleInRadians)),
        y: centerY + (radius * Math.sin(angleInRadians))
    };
}

/* ================= REAL-TIME SLIDE MATRIX GENERATION ================= */
function renderSlide(){
    if(stationsData.length === 0) return;

    const st = stationsData[currentSlide];
    let cleanRiverName = st.basin.replace(/basin/gi, "").trim();
    document.getElementById("basinTitleHeader").innerText = cleanRiverName;

    let lookupKey = st.gauge;
    if (st.gauge.includes("Kalawellawa")) lookupKey = "Kalawellawa (Millakanda)";

    const hasGauge = thresholds.hasOwnProperty(lookupKey);
    const th = thresholds[lookupKey] || { alert: 0, minor: 0, major: 0, maxScale: 10.0, unit: "m" };

    let levelClass = "normal-level";
    if (!hasGauge) {
        levelClass = "no-gauge-level";
    } else if(th.major > 0 && st.water_level >= th.major){
        levelClass = "major-level";
    } else if(th.minor > 0 && st.water_level >= th.minor){
        levelClass = "minor-level";
    } else if(th.alert > 0 && st.water_level >= th.alert){
        levelClass = "alert-level";
    }

    let mainStationHTML = `<div class="station-main-name ${levelClass}">${st.gauge}</div>`;
    if (st.gauge.includes("Kalawellawa")) {
        mainStationHTML = `
            <div class="station-main-name ${levelClass}">Kalawellawa</div>
            <div class="station-sub-name">Millakanda</div>
        `;
    }

    const maxVal = th.maxScale;
    const cx = 270; const cy = 270; const arcRadius = 205;

    const angAlert = hasGauge ? (-90 + (th.alert / maxVal) * 180) : -45;
    const angMinor = hasGauge ? (-90 + (th.minor / maxVal) * 180) : 0;
    const angMajor = hasGauge ? (-90 + (th.major / maxVal) * 180) : 45;
    
    const pct = Math.min(Math.max(st.water_level / maxVal, 0), 1);
    const needleAngle = hasGauge ? (-90 + (pct * 180)) : -90; 

    const pNormal = polarToCartesian(cx, cy, arcRadius, (-90 + angAlert) / 2);
    const pAlert  = polarToCartesian(cx, cy, arcRadius, (angAlert + angMinor) / 2);
    const pMinor  = polarToCartesian(cx, cy, arcRadius, (angMinor + angMajor) / 2);
    const pMajor  = polarToCartesian(cx, cy, arcRadius, (angMajor + 90) / 2);

    const lineAlert = polarToCartesian(cx, cy, 242, angAlert);
    const lineMinor = polarToCartesian(cx, cy, 242, angMinor);
    const lineMajor = polarToCartesian(cx, cy, 242, angMajor);

    /* ===== DELTA TREND CALCULATION MODULE ===== */
    let trendHTML = `<span class="trend-badge trend-stable">■ Stable</span>`;
    
    const matchingHistory = historicalRaw
        .filter(f => {
            let name = f.attributes.gauge ? f.attributes.gauge.trim() : "";
            if (name.toLowerCase() === "pera" || name.toLowerCase() === "peradeniya") name = "Peradeniya";
            return name === st.gauge;
        })
        .sort((a, b) => a.attributes.EditDate - b.attributes.EditDate);

    if (hasGauge && matchingHistory.length > 1) {
        const currentWaterLevel = st.water_level;
        const previousWaterLevel = matchingHistory[matchingHistory.length - 2].attributes.water_level;
        
        if (currentWaterLevel > previousWaterLevel) {
            trendHTML = `<span class="trend-badge trend-raising"><i class="fa-solid fa-arrow-trend-up"></i> Raising</span>`;
        } else if (currentWaterLevel < previousWaterLevel) {
            trendHTML = `<span class="trend-badge trend-reducing"><i class="fa-solid fa-arrow-trend-down"></i> Reducing</span>`;
        }
    }

    /* ===== METRIC RAINFALL PROCESSING ELEMENT ===== */
    let hourlyRainDisplay = "0.0";
    let dailyRainDisplay = "0.0";
    const isNagalagam = st.gauge.toLowerCase().includes("nagalagam");

    if (st.rain_fall === undefined || st.rain_fall === null || st.rain_fall === "" || Number(st.rain_fall) < 0 || isNagalagam) {
        hourlyRainDisplay = "NA";  dailyRainDisplay = "NA";
    } else {
        hourlyRainDisplay = Number(st.rain_fall) === 0 ? "0.0" : Number(st.rain_fall).toFixed(1);

        let rainSum24h = 0;
        const currentStationTime = st.EditDate;
        const indexCutoff24h = currentStationTime - (24 * 60 * 60 * 1000);

        historicalRaw.forEach(f => {
            const histAttr = f.attributes;
            let histName = histAttr.gauge ? histAttr.gauge.trim() : "";
            if (histName.toLowerCase() === "pera" || histName.toLowerCase() === "peradeniya") histName = "Peradeniya";

            if (histName === st.gauge && histAttr.EditDate > indexCutoff24h && histAttr.EditDate <= currentStationTime) {
                if (histAttr.rain_fall !== undefined && histAttr.rain_fall !== null && Number(histAttr.rain_fall) >= 0) {
                    rainSum24h += Number(histAttr.rain_fall);
                }
            }
        });
        dailyRainDisplay = rainSum24h === 0 ? "0.0" : rainSum24h.toFixed(1);
    }

    let waterLevelDisplay = Number(st.water_level).toFixed(2);
    let unitDisplay = `<span class="unit">${th.unit}</span>`;
    if(!hasGauge) { waterLevelDisplay = "N/G"; unitDisplay = ""; trendHTML = ""; }

    document.getElementById("dashboard").innerHTML = `
    <div class="card">
        <div class="station-container">
            ${mainStationHTML}
        </div>
        
        <div class="content">
            <div class="left-block">
                <div class="gauge-container">
                    <svg class="gauge-svg" viewBox="0 0 540 270">
                        <path d="${describeArc(cx, cy, arcRadius, -90, angAlert)}" fill="none" stroke="${hasGauge ? 'var(--green)' : 'var(--gauge-empty-arc)'}" stroke-width="66"/>
                        <path d="${describeArc(cx, cy, arcRadius, angAlert, angMinor)}" fill="none" stroke="${hasGauge ? 'var(--yellow)' : 'var(--gauge-empty-arc)'}" stroke-width="66"/>
                        <path d="${describeArc(cx, cy, arcRadius, angMinor, angMajor)}" fill="none" stroke="${hasGauge ? 'var(--amber)' : 'var(--gauge-empty-arc)'}" stroke-width="66"/>
                        <path d="${describeArc(cx, cy, arcRadius, angMajor, 90)}" fill="none" stroke="${hasGauge ? 'var(--red)' : 'var(--gauge-empty-arc)'}" stroke-width="66"/>

                        ${hasGauge ? `
                        <line x1="${cx}" y1="${cy}" x2="${lineAlert.x}" y2="${lineAlert.y}" stroke="#000" stroke-width="2" stroke-dasharray="4,4"/>
                        <rect x="${lineAlert.x - 26}" y="${lineAlert.y - 26}" width="52" height="24" class="gauge-bg-badge" />
                        <text x="${lineAlert.x}" y="${lineAlert.y - 13}" class="gauge-text gauge-val-marker" fill="var(--th-txt-normal)">${th.alert.toFixed(1)}</text>
                        
                        <line x1="${cx}" y1="${cy}" x2="${lineMinor.x}" y2="${lineMinor.y}" stroke="#000" stroke-width="2" stroke-dasharray="4,4"/>
                        <rect x="${lineMinor.x - 26}" y="${lineMinor.y - 28}" width="52" height="24" class="gauge-bg-badge" />
                        <text x="${lineMinor.x}" y="${lineMinor.y - 15}" class="gauge-text gauge-val-marker" fill="var(--th-txt-minor)">${th.minor.toFixed(1)}</text>
                        
                        <line x1="${cx}" y1="${cy}" x2="${lineMajor.x}" y2="${lineMajor.y}" stroke="#000" stroke-width="2" stroke-dasharray="4,4"/>
                        <rect x="${lineMajor.x - 26}" y="${lineMajor.y - 26}" width="52" height="24" class="gauge-bg-badge" />
                        <text x="${lineMajor.x}" y="${lineMajor.y - 13}" class="gauge-text gauge-val-marker" fill="var(--th-txt-major)">${th.major.toFixed(1)}</text>
                        ` : ''}

                        <text x="${pNormal.x}" y="${pNormal.y}" class="gauge-text">${hasGauge ? 'Normal' : 'N/A'}</text>
                        <text x="${pAlert.x}" y="${pAlert.y}" class="gauge-text">${hasGauge ? 'Alert' : 'N/A'}</text>
                        <text x="${pMinor.x}" y="${pMinor.y}" class="gauge-text">${hasGauge ? 'Minor' : 'N/A'}</text>
                        <text x="${pMajor.x}" y="${pMajor.y}" class="gauge-text">${hasGauge ? 'Major' : 'N/A'}</text>

                        <line x1="${cx}" y1="${cy}" x2="${cx}" y2="30" class="gauge-needle-line" style="transform: rotate(${needleAngle}deg);"/>
                        <circle cx="${cx}" cy="${cy}" r="15" class="gauge-pivot-circle"/>
                    </svg>
                </div>

                <div class="water-level-data-block">
                    <div class="water-level-label-wrapper">
                        <div class="water-level-label">Water Level Status</div>
                        ${trendHTML}
                    </div>
                    <div class="water-level ${levelClass}">
                        ${waterLevelDisplay}${unitDisplay}
                    </div>
                </div>
            </div>

            <div class="right-block">
                <div class="graph-container-box">
                    <canvas id="stationTrendChart"></canvas>
                </div>

                <div class="bottom-rain-row">
                    <div class="rain-box">
                        <div class="rain-details">
                            <div class="rain-title">Rainfall</div>
                            <div class="rain-subtitle">Hourly Value</div>
                        </div>
                        <div class="rain-icon"><i class="fa-solid fa-cloud-sun-rain"></i></div>
                        <div class="rain-value-wrapper">
                            <span class="rain-value">${hourlyRainDisplay}</span>
                            ${hourlyRainDisplay !== "NA" ? `<span class="rain-unit">mm</span>` : ""}
                        </div>
                    </div>

                    <div class="rain-box">
                        <div class="rain-details">
                            <div class="rain-title">Rainfall</div>
                            <div class="rain-subtitle">Last 24 Hours</div>
                        </div>
                        <div class="rain-icon"><i class="fa-solid fa-cloud-showers-heavy"></i></div>
                        <div class="rain-value-wrapper">
                            <span class="rain-value">${dailyRainDisplay}</span>
                            ${dailyRainDisplay !== "NA" ? `<span class="rain-unit">mm</span>` : ""}

    /* ===== INITIALIZE HISTORICAL GRAPH RENDER INSTANCE WITH RAINFALL OVERLAY ===== */
    buildHistoricalGraph(matchingHistory, th, hasGauge, st.gauge);

    currentSlide = (currentSlide + 1) % stationsData.length;
}

/* ═══════════════════════════════════════════════════════════
   FULLY CUSTOM ANIMATED CHART ENGINE — OUTDOOR VIDEO WALL
   No Chart.js animation system used.
   Everything drawn frame-by-frame via requestAnimationFrame.
═══════════════════════════════════════════════════════════ */

let _raf = null;          // master animation frame handle
let _animState = null;    // current animation state object

/* ── easing ── */
function easeOutExpo(t) { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }
function easeOutBounce(t) {
    const n1 = 7.5625, d1 = 2.75;
    if (t < 1/d1)       return n1*t*t;
    if (t < 2/d1)       return n1*(t-=1.5/d1)*t+0.75;
    if (t < 2.5/d1)     return n1*(t-=2.25/d1)*t+0.9375;
    return n1*(t-=2.625/d1)*t+0.984375;
}
function easeInOutSine(t) { return -(Math.cos(Math.PI*t)-1)/2; }

/* ── map a data value to canvas pixel Y ── */
function valToY(val, yMin, yMax, top, bottom) {
    return bottom - ((val - yMin) / (yMax - yMin)) * (bottom - top);
}

/* ── catmull-rom spline: get point on curve between p1 and p2 ── */
function catmullRom(p0, p1, p2, p3, t) {
    return 0.5 * (
        (2*p1) +
        (-p0 + p2)*t +
        (2*p0 - 5*p1 + 4*p2 - p3)*t*t +
        (-p0 + 3*p1 - 3*p2 + p3)*t*t*t
    );
}

function buildHistoricalGraph(historyRecords, th, hasGauge, currentGaugeName) {

    /* ── kill any running animation ── */
    if (_raf) { cancelAnimationFrame(_raf); _raf = null; }
    if (liveChartInstance) { liveChartInstance.destroy(); liveChartInstance = null; }

    /* ── canvas ── */
    const canvas = document.getElementById('stationTrendChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    /* ── 4-day data window ── */
    let recs = historyRecords;
    if (recs.length > 0) {
        const last = recs[recs.length-1].attributes.EditDate;
        recs = recs.filter(r => r.attributes.EditDate >= last - 4*86400000);
    }
    if (recs.length < 5) recs = historyRecords.slice(-20);

    const n = recs.length;
    if (n === 0) return;

    /* ── raw data ── */
    const wlRaw  = recs.map(r => r.attributes.water_level);
    const rfRaw  = recs.map(r => {
        const v = r.attributes.rain_fall;
        return (v == null || Number(v) < 0 || currentGaugeName.toLowerCase().includes('nagalagam')) ? 0 : Number(v);
    });
    const labels = recs.map(r => {
        const d = new Date(r.attributes.EditDate);
        return `${d.getDate()} ${d.toLocaleString('en-US',{month:'short'})} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    });

    /* ── axis ranges ── */
    const isDay     = document.body.classList.contains('day-mode');
    const txtColor  = isDay ? '#000' : '#fff';
    const gridColor = isDay ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.10)';

    const wlMax  = hasGauge ? th.maxScale : Math.max(...wlRaw) * 1.15;
    const wlMin  = 0;
    const rfMax  = Math.max(20, Math.max(...rfRaw) * 1.2);
    const rfMin  = 0;

    /* ── benchmark lines ── */
    const benches = [];
    if (hasGauge) {
        if (th.alert > 0) benches.push({ v: th.alert, color: '#ffd400', label: 'Alert'  });
        if (th.minor > 0) benches.push({ v: th.minor, color: '#ff9100', label: 'Minor'  });
        if (th.major > 0) benches.push({ v: th.major, color: '#ff1744', label: 'Major'  });
    }

    /* ── layout margins ── */
    const PAD  = { top: 32, right: 80, bottom: 54, left: 72 };

    /* ── animation state ── */
    //  Phase 0 (0–0.25): bars rise from bottom
    //  Phase 1 (0.20–0.75): line draws left→right
    //  Phase 2 (0.70–1.00): threshold lines sweep in + points pop
    //  After complete: idle RAF for flowing dash + point pulses
    const START = performance.now();
    const TOTAL_MS = 2000;   // total intro animation ms

    /* per-point pop timing (staggered after line arrives at that point) */
    const ptPop = new Float32Array(n);   // 0→1 scale for each point dot

    /* ── main draw function ── */
    function draw(now) {
        const W = canvas.offsetWidth;
        const H = canvas.offsetHeight;
        if (canvas.width !== W || canvas.height !== H) {
            canvas.width  = W;
            canvas.height = H;
        }
        ctx.clearRect(0, 0, W, H);

        const L = PAD.left, R = W - PAD.right;
        const T = PAD.top,  B = H - PAD.bottom;
        const CW = R - L,   CH = B - T;

        /* elapsed 0→1 */
        const raw = Math.min((now - START) / TOTAL_MS, 1);
        const done = raw >= 1;

        /* phase fractions */
        const barProg  = easeOutExpo(Math.min(raw / 0.28, 1));
        const lineProg = easeOutExpo(Math.min(Math.max((raw - 0.18) / 0.55, 0), 1));
        const thProg   = easeOutExpo(Math.min(Math.max((raw - 0.68) / 0.32, 0), 1));

        /* x positions for each data point */
        const xs = Array.from({length:n}, (_,i) => L + (i/(n-1||1)) * CW);
        /* y positions for water level */
        const ys = wlRaw.map(v => valToY(v, wlMin, wlMax, T, B));
        /* y positions for rain (right axis) */
        const yr = rfRaw.map(v => valToY(v, rfMin, rfMax, T, B));

        /* how far along the line the cursor is (in point-index units) */
        const cursorIdx = lineProg * (n - 1);

        /* ════════ GRID + AXES ════════ */
        ctx.save();

        /* y-axis grid lines & labels (water level, left) */
        const wlTicks = 5;
        for (let i = 0; i <= wlTicks; i++) {
            const v   = wlMin + (wlMax - wlMin) * (i / wlTicks);
            const py  = valToY(v, wlMin, wlMax, T, B);
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(L, py); ctx.lineTo(R, py); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#11dfff';
            ctx.font = 'bold 12px Segoe UI';
            ctx.textAlign = 'right';
            ctx.fillText(v.toFixed(1), L - 8, py + 4);
        }

        /* y-axis label left */
        ctx.save();
        ctx.translate(16, T + CH/2);
        ctx.rotate(-Math.PI/2);
        ctx.textAlign = 'center';
        ctx.font = 'bold 13px Segoe UI';
        ctx.fillStyle = '#11dfff';
        ctx.fillText(hasGauge ? `Water Level (${th.unit})` : 'Water Level', 0, 0);
        ctx.restore();

        /* y-axis right (rainfall) */
        const rfTicks = 4;
        for (let i = 0; i <= rfTicks; i++) {
            const v  = rfMin + (rfMax - rfMin) * (i / rfTicks);
            const py = valToY(v, rfMin, rfMax, T, B);
            ctx.fillStyle = '#ffd400';
            ctx.font = 'bold 12px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText(v.toFixed(0), R + 8, py + 4);
        }
        ctx.save();
        ctx.translate(W - 14, T + CH/2);
        ctx.rotate(Math.PI/2);
        ctx.textAlign = 'center';
        ctx.font = 'bold 13px Segoe UI';
        ctx.fillStyle = '#ffd400';
        ctx.fillText('Rainfall (mm)', 0, 0);
        ctx.restore();

        /* x-axis ticks & labels */
        const maxTicks = Math.min(12, n);
        const step = Math.ceil(n / maxTicks);
        for (let i = 0; i < n; i += step) {
            const px = xs[i];
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(px, T); ctx.lineTo(px, B); ctx.stroke();
            ctx.setLineDash([]);
            ctx.save();
            ctx.translate(px, B + 8);
            ctx.rotate(Math.PI / 4);
            ctx.fillStyle = txtColor;
            ctx.font = 'bold 11px Segoe UI';
            ctx.textAlign = 'left';
            ctx.fillText(labels[i], 0, 0);
            ctx.restore();
        }

        /* axis border */
        ctx.strokeStyle = isDay ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(L, T); ctx.lineTo(L, B); ctx.lineTo(R, B);
        ctx.stroke();

        ctx.restore();

        /* ════════ RAINFALL BARS (rise from bottom) ════════ */
        ctx.save();
        const barW = Math.max(2, CW / n * 0.45);
        rfRaw.forEach((v, i) => {
            if (v <= 0) return;
            const px    = xs[i];
            const fullH = B - yr[i];
            const animH = fullH * barProg;
            const by    = B - animH;

            /* gradient fill */
            const gBar = ctx.createLinearGradient(0, by, 0, B);
            gBar.addColorStop(0,   'rgba(255,212,0,0.75)');
            gBar.addColorStop(0.5, 'rgba(255,160,0,0.45)');
            gBar.addColorStop(1,   'rgba(255,212,0,0.10)');
            ctx.fillStyle = gBar;
            ctx.shadowColor = '#ffd400';
            ctx.shadowBlur  = 14;
            ctx.beginPath();
            ctx.roundRect(px - barW/2, by, barW, animH, [3,3,0,0]);
            ctx.fill();

            /* top cap glow line */
            if (animH > 2) {
                ctx.shadowBlur = 0;
                ctx.strokeStyle = '#ffd400';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(px - barW/2, by);
                ctx.lineTo(px + barW/2, by);
                ctx.stroke();
            }
        });
        ctx.shadowBlur = 0;
        ctx.restore();

        /* ════════ WATER LEVEL LINE (draw left → right) ════════ */
        if (lineProg > 0) {
            /* clipping: only draw up to cursor x */
            const clipX = L + lineProg * CW;

            /* ── filled area under curve ── */
            ctx.save();
            ctx.beginPath();
            ctx.rect(L, T, clipX - L, CH);
            ctx.clip();

            const grad = ctx.createLinearGradient(0, T, 0, B);
            if (isDay) {
                grad.addColorStop(0,   'rgba(0,70,200,0.50)');
                grad.addColorStop(0.6, 'rgba(0,100,255,0.18)');
                grad.addColorStop(1,   'rgba(0,70,200,0.02)');
            } else {
                grad.addColorStop(0,   'rgba(17,223,255,0.50)');
                grad.addColorStop(0.6, 'rgba(17,140,255,0.18)');
                grad.addColorStop(1,   'rgba(17,223,255,0.02)');
            }

            ctx.beginPath();
            ctx.moveTo(xs[0], B);
            for (let i = 0; i < n; i++) {
                /* catmull-rom point */
                ctx.lineTo(xs[i], ys[i]);
            }
            const lastDrawnX = Math.min(clipX, xs[n-1]);
            ctx.lineTo(lastDrawnX, B);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();

            /* ── glow line outer ── */
            ctx.save();
            ctx.beginPath();
            ctx.rect(L, T-10, clipX - L, CH + 20);
            ctx.clip();

            ctx.beginPath();
            for (let i = 0; i < n; i++) {
                const x0 = xs[Math.max(i-1,0)], y0 = ys[Math.max(i-1,0)];
                const x1 = xs[i], y1 = ys[i];
                const x2 = xs[Math.min(i+1,n-1)], y2 = ys[Math.min(i+1,n-1)];
                const x3 = xs[Math.min(i+2,n-1)], y3 = ys[Math.min(i+2,n-1)];
                if (i === 0) {
                    ctx.moveTo(x1, y1);
                } else {
                    /* control points for smooth bezier */
                    const cpx1 = x0 + (x1 - xs[Math.max(i-2,0)]) / 6;
                    const cpy1 = y0 + (y1 - ys[Math.max(i-2,0)]) / 6;
                    const cpx2 = x1 - (x2 - x0) / 6;
                    const cpy2 = y1 - (y2 - y0) / 6;
                    ctx.bezierCurveTo(cpx1, cpy1, cpx2, cpy2, x1, y1);
                }
            }
            ctx.strokeStyle = '#11dfff';
            ctx.lineWidth   = 7;
            ctx.shadowColor = '#11dfff';
            ctx.shadowBlur  = 30;
            ctx.setLineDash([]);
            ctx.stroke();

            /* white core */
            ctx.beginPath();
            for (let i = 0; i < n; i++) {
                const x0 = xs[Math.max(i-1,0)], y0 = ys[Math.max(i-1,0)];
                const x1 = xs[i], y1 = ys[i];
                const x2 = xs[Math.min(i+1,n-1)], y2 = ys[Math.min(i+1,n-1)];
                if (i === 0) {
                    ctx.moveTo(x1, y1);
                } else {
                    const cpx1 = x0 + (x1 - xs[Math.max(i-2,0)]) / 6;
                    const cpy1 = y0 + (y1 - ys[Math.max(i-2,0)]) / 6;
                    const cpx2 = x1 - (x2 - x0) / 6;
                    const cpy2 = y1 - (y2 - y0) / 6;
                    ctx.bezierCurveTo(cpx1, cpy1, cpx2, cpy2, x1, y1);
                }
            }
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth   = 2;
            ctx.shadowBlur  = 12;
            ctx.stroke();
            ctx.shadowBlur  = 0;
            ctx.restore();

            /* ── animated cursor dot at leading edge ── */
            if (!done) {
                const ci = Math.floor(cursorIdx);
                const cf = cursorIdx - ci;
                const ci2 = Math.min(ci + 1, n - 1);
                const curX = xs[ci] + (xs[ci2] - xs[ci]) * cf;
                const curY = ys[ci] + (ys[ci2] - ys[ci]) * cf;
                /* outer pulse ring */
                ctx.save();
                ctx.strokeStyle = '#11dfff';
                ctx.lineWidth   = 2.5;
                ctx.globalAlpha = 0.4 + 0.3 * Math.sin(now * 0.012);
                ctx.shadowColor = '#11dfff';
                ctx.shadowBlur  = 20;
                ctx.beginPath();
                ctx.arc(curX, curY, 14, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
                /* inner solid dot */
                ctx.fillStyle  = '#11dfff';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(curX, curY, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
            }

            /* ── data point dots (pop in after line reaches them) ── */
            if (n <= 60) {
                for (let i = 0; i < n; i++) {
                    /* point becomes visible once the line passes it */
                    const arrivedAt = i / (n - 1);
                    if (lineProg < arrivedAt) { ptPop[i] = 0; continue; }
                    /* pop animation: scale 0→1 quickly after arrival */
                    const popStart = arrivedAt;
                    const popEnd   = popStart + 0.06;
                    const pt = Math.min((lineProg - popStart) / (popEnd - popStart + 0.001), 1);
                    ptPop[i] = easeOutBounce(pt);

                    if (ptPop[i] <= 0) continue;
                    const s = ptPop[i];

                    ctx.save();
                    ctx.translate(xs[i], ys[i]);
                    ctx.scale(s, s);

                    /* outer ring pulse (idle) */
                    const pulse = done ? (0.5 + 0.5 * Math.sin(now * 0.004 + i * 0.8)) : 0;
                    if (done && pulse > 0) {
                        ctx.strokeStyle = '#11dfff';
                        ctx.lineWidth   = 1.5;
                        ctx.globalAlpha = pulse * 0.55;
                        ctx.shadowColor = '#11dfff';
                        ctx.shadowBlur  = 12;
                        ctx.beginPath();
                        ctx.arc(0, 0, 11, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                        ctx.shadowBlur  = 0;
                    }

                    /* dot fill */
                    ctx.fillStyle  = '#ffffff';
                    ctx.shadowColor = '#11dfff';
                    ctx.shadowBlur  = 16;
                    ctx.strokeStyle = '#11dfff';
                    ctx.lineWidth   = 2.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }

        /* ════════ THRESHOLD LINES (sweep left→right, then flow) ════════ */
        if (thProg > 0) {
            ctx.save();
            benches.forEach(line => {
                const py = valToY(line.v, wlMin, wlMax, T, B);
                if (py < T || py > B) return;
                const drawTo = L + thProg * CW;

                /* glow dashed line — offset flows continuously once complete */
                const dashOffset = done ? -(now / 35) % 16 : 0;
                ctx.strokeStyle = line.color;
                ctx.lineWidth   = 3;
                ctx.setLineDash([10, 6]);
                ctx.lineDashOffset = dashOffset;
                ctx.shadowColor = line.color;
                ctx.shadowBlur  = 12;
                ctx.beginPath();
                ctx.moveTo(L, py);
                ctx.lineTo(drawTo, py);
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.setLineDash([]);

                /* label badge fades in last 15% of sweep */
                const lblAlpha = Math.min((thProg - 0.85) / 0.15, 1);
                if (lblAlpha > 0) {
                    const lbl = `${line.label}  ${line.v}`;
                    ctx.font = 'bold 14px Segoe UI';
                    const tw = ctx.measureText(lbl).width;
                    const bx = R - tw - 18, by = py - 22, bw = tw + 14, bh = 22;
                    ctx.globalAlpha = lblAlpha;
                    ctx.fillStyle   = 'rgba(0,0,0,0.75)';
                    ctx.beginPath();
                    ctx.roundRect(bx, by, bw, bh, 5);
                    ctx.fill();
                    ctx.strokeStyle = line.color;
                    ctx.lineWidth   = 1.5;
                    ctx.stroke();
                    ctx.fillStyle  = line.color;
                    ctx.textAlign  = 'left';
                    ctx.fillText(lbl, bx + 7, by + 15);
                    ctx.globalAlpha = 1;
                }
            });
            ctx.restore();
        }

        /* ════════ LEGEND ════════ */
        ctx.save();
        ctx.font = 'bold 13px Segoe UI';
        ctx.textAlign = 'left';
        const legendItems = [
            { color: '#11dfff', label: 'Water Level' },
            { color: '#ffd400', label: 'Hourly Rainfall' }
        ];
        let lx = L;
        legendItems.forEach(item => {
            ctx.fillStyle   = item.color;
            ctx.shadowColor = item.color;
            ctx.shadowBlur  = 8;
            ctx.fillRect(lx, T - 22, 28, 4);
            ctx.shadowBlur  = 0;
            ctx.fillStyle   = txtColor;
            ctx.fillText(item.label, lx + 34, T - 14);
            lx += ctx.measureText(item.label).width + 60;
        });
        ctx.restore();

        /* ════════ SCANLINES (night only) ════════ */
        if (!isDay) {
            ctx.save();
            ctx.globalAlpha = 0.025;
            ctx.fillStyle = '#000';
            for (let sy = T; sy < B; sy += 3) {
                ctx.fillRect(L, sy, CW, 1);
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }

        /* ── keep looping until destroyed ── */
        _raf = requestAnimationFrame(draw);
    }

    _raf = requestAnimationFrame(draw);
    /* store a destroy handle so renderSlide cleanup works */
    liveChartInstance = { _destroyed: false, destroy() { this._destroyed = true; if(_raf){cancelAnimationFrame(_raf);_raf=null;} } };
}

/* ================= ROTATION METRONOME ENGINE ================= */
function startSlider(){
    if(stationsData.length === 0){
        setTimeout(startSlider, 10000);
        return;
    }

    renderSlide();
    
    const currentStation = stationsData[currentSlide];
    let interval = 10000;
    if(currentStation && currentStation.gauge.toLowerCase().includes("nagalagam")){
        interval = 10000;
    }
    
    setTimeout(startSlider, interval);
}

/* ================= ENGINE START CHECKS ================= */
loadData();
setInterval(loadData, 60000); 
setTimeout(startSlider, 3000);
</script>
